<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Жәндіктердің сыртқы дене құрылысы</title>
    <style>
        :root {
            --primary-color: #1a3a1a;
            --accent-color: #2d6a2d;
            --bg-color: #f0f7f0;
            --card-bg: #ffffff;
            --success-color: #27ae60;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            padding: 12px;
            color: #333;
            user-select: none;
            line-height: 1.5;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 12px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 20px;
        }
        .h1-sub {
            text-align: center;
            color: #5a7a5a;
            font-size: 0.85rem;
            margin-top: -14px;
            margin-bottom: 20px;
            font-style: italic;
        }
        .user-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 25px;
            padding: 16px;
            background: #eef5ee;
            border-radius: 8px;
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 6px; font-size: 0.95rem; color: var(--primary-color); }
        input[type="text"] {
            padding: 12px;
            border: 1px solid #a8c8a8;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            background-color: #fff;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-color); outline: none; }
        .question {
            margin-bottom: 20px;
            padding: 16px;
            border-left: 5px solid var(--accent-color);
            background: #fafcfa;
            border-radius: 0 8px 8px 0;
        }
        .question p { font-weight: bold; margin-bottom: 12px; font-size: 1rem; color: var(--primary-color); }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px;
            border: 1px solid #c8e0c8;
            border-radius: 6px;
            background-color: #fff;
            transition: background 0.2s, border-color 0.2s;
            font-size: 0.95rem;
        }
        .option:hover { background: #f0f8f0; border-color: #8dc88d; }
        input[type="radio"] {
            margin-right: 12px; cursor: pointer;
            width: 18px; height: 18px; flex-shrink: 0;
            accent-color: var(--accent-color);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
            font-family: 'Times New Roman', Times, serif;
        }
        .btn-submit:hover:not(:disabled) { background-color: #219653; }
        .btn-submit:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #success-message {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }
        #success-message h2 { color: var(--success-color); font-size: 1.6rem; margin-bottom: 12px; }
        #success-message .icon { font-size: 50px; margin-bottom: 15px; }
        #success-message p { margin-bottom: 8px; color: #555; }
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        @media (min-width: 600px) {
            body { padding: 30px 20px; }
            .container { padding: 40px; }
            .user-info { grid-template-columns: 1fr 1fr; gap: 20px; }
            .question { padding: 20px; margin-bottom: 25px; }
            .option { padding: 10px 14px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loading-overlay">
    <div style="font-size: 20px; font-weight: bold; color: var(--primary-color);">Жіберілуде / Отправка...</div>
</div>

<div class="container">
    <div id="quiz-content">
        <h1>🪲 Тест: Жәндіктердің сыртқы дене құрылысы</h1>
        <div class="h1-sub">Темирболатова А.Б. · 2 курс · Л-21</div>

        <form id="quizForm">
            <div class="user-info">
                <div class="input-group">
                    <label for="fio">Студенттің аты-жөні / ФИО студента *</label>
                    <input type="text" id="fio" name="fio" required placeholder="Атыңызды енгізіңіз">
                </div>
                <div class="input-group">
                    <label for="group">Топ / Группа *</label>
                    <input type="text" id="group" name="group" required placeholder="Мысалы: Л-21">
                </div>
            </div>

            <div id="questionsContainer"></div>

            <button type="submit" id="submitBtn" class="btn-submit">✅ Жауаптарды жіберу / Отправить ответы</button>
        </form>
    </div>

    <div id="success-message">
        <div class="icon">✅</div>
        <h2>Рахмет! Жауаптарыңыз қабылданды.</h2>
        <p>Спасибо! Результаты теста успешно отправлены преподавателю.</p>
        <p id="result-summary" style="font-weight: bold; font-size: 1.3em; margin-top: 15px; color: var(--primary-color);"></p>
        <button class="btn-submit" style="background-color: #1a3a1a; margin-top: 30px; max-width: 300px; margin-left: auto; margin-right: auto;" onclick="goToHome()">
            ← Басты бетке оралу / Вернуться на главную
        </button>
    </div>
</div>

<script>
    // 7 вопросов на казахском языке
    const questions = [
        {
            q: "1. Жәндіктің денесі неше бөлімге бөлінеді?",
            a: ["а) 2", "б) 3", "в) 4"],
            c: 1
        },
        {
            q: "2. Жәндіктің бас бөлімінде не орналасады?",
            a: ["а) қанаттар", "б) аяқтар", "в) мұртша мен көздер"],
            c: 2
        },
        {
            q: "3. Жәндіктерде неше жұп аяқ болады?",
            a: ["а) 2", "б) 3", "в) 4"],
            c: 1
        },
        {
            q: "4. Қанаттар қай бөлікке бекінеді?",
            a: ["а) басына", "б) көкірекке", "в) құрсаққа"],
            c: 1
        },
        {
            q: "5. Мұртшалар жәндіктерге не үшін қажет?",
            a: ["а) тыныс алу үшін", "б) иіс сезу және сипап сезу үшін", "в) қорғану үшін"],
            c: 1
        },
        {
            q: "6. Жәндіктердің сыртқы жабыны қалай аталады?",
            a: ["а) тері", "б) хитин", "в) қабыршақ"],
            c: 1
        },
        {
            q: "7. Жәндіктер қандай пайда келтіреді?",
            a: ["а) өсімдіктерді тозаңдандырады", "б) тастарды бұзады", "в) суды тазартады"],
            c: 0
        },
    ];

    const container = document.getElementById('questionsContainer');

    questions.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        const qText = document.createElement('p');
        qText.innerText = item.q;
        qDiv.appendChild(qText);
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
        item.a.forEach((ans, ai) => {
            const label = document.createElement('label');
            label.className = 'option';
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `q${index}`;
            radio.value = String(ai);
            radio.required = true;
            label.appendChild(radio);
            label.appendChild(document.createTextNode(ans));
            optionsDiv.appendChild(label);
        });
        qDiv.appendChild(optionsDiv);
        container.appendChild(qDiv);
    });

    // Блокировка инструментов разработчика
    document.onkeydown = function(e) {
        if (e.keyCode === 123) return false;
        if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(String.fromCharCode(e.keyCode))) return false;
        if (e.ctrlKey && e.keyCode === 85) return false;
    };

    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwLrytzhyRd5CZG2nE3XM2Cia972Xs0aCIXBoB-n-Or2usLpM6y9qpHyVfRZGKrJK5yRw/exec';

    document.getElementById('quizForm').onsubmit = function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Жіберілуде / Отправка...";
        document.getElementById('loading-overlay').style.display = 'flex';

        const formData = new FormData(this);
        const data = { fio: formData.get('fio'), group: formData.get('group') };

        let score = 0;
        questions.forEach((item, index) => {
            const chosen = formData.get(`q${index}`);
            if (chosen !== null && parseInt(chosen) === item.c) score++;
            data[`q${index}`] = chosen !== null ? item.a[parseInt(chosen)] : 'Таңдалмаған';
        });
        data.score = score;
        data.total = questions.length;
        data.subject = 'Жәндіктердің сыртқы дене құрылысы';
        data.date = new Date().toLocaleString('ru-KZ');

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            document.getElementById('result-summary').innerText =
                `Нәтиже / Результат: ${score} из ${questions.length} (${Math.round(score/questions.length*100)}%)`;
        }).catch(err => {
            console.error(err);
            alert('Қате / Ошибка при отправке. Попробуйте ещё раз.');
            submitBtn.disabled = false;
            submitBtn.innerText = "✅ Жауаптарды жіберу / Отправить ответы";
            document.getElementById('loading-overlay').style.display = 'none';
        });
    };

    function goToHome() {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
