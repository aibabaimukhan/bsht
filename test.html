<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Внутреннее строение насекомых</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --success-color: #27ae60;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            padding: 12px; /* Уменьшено для мобильных экранов */
            color: #333;
            user-select: none;
            line-height: 1.5;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px; /* Адаптивный внутренний отступ */
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 12px;
            font-size: clamp(1.4rem, 4vw, 2rem); /* Плавное изменение размера шрифта */
            margin-bottom: 20px;
        }
        .user-info {
            display: grid;
            grid-template-columns: 1fr; /* По умолчанию одна колонка на мобильных */
            gap: 16px;
            margin-bottom: 25px;
            padding: 16px;
            background: #eef2f3;
            border-radius: 8px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        input[type="text"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            background-color: #fff;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        .question {
            margin-bottom: 20px;
            padding: 16px;
            border-left: 5px solid var(--accent-color);
            background: #fafafa;
            border-radius: 0 8px 8px 0;
        }
        .question p {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.05rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px; /* Увеличено для удобного нажатия пальцем */
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background-color: #fff;
            transition: background 0.2s, border-color 0.2s;
            font-size: 0.95rem;
        }
        .option:hover {
            background: #f5f9fc;
            border-color: #cbdbe6;
        }
        input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            flex-shrink: 0; /* Чтобы кружок не сплющивался при длинном тексте */
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .btn-submit:hover:not(:disabled) {
            background-color: #219653;
        }
        .btn-submit:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* Финальное сообщение */
        #success-message {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }
        #success-message h2 {
            color: var(--success-color);
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        #success-message .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        #success-message p {
            margin-bottom: 8px;
            color: #555;
        }
        
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* ===== МЕДИА-ЗАПРОСЫ ДЛЯ ПЛАНШЕТОВ И ПК ===== */
        @media (min-width: 600px) {
            body {
                padding: 30px 20px;
            }
            .container {
                padding: 40px;
            }
            .user-info {
                grid-template-columns: 1fr 1fr; /* Две колонки для полей ФИО и Группа */
                gap: 20px;
            }
            .question {
                padding: 20px;
                margin-bottom: 25px;
            }
            .option {
                padding: 10px 14px; /* Чуть компактнее на десктопах */
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loading-overlay">
    <div style="font-size: 20px; font-weight: bold; color: var(--primary-color);">Идет отправка...</div>
</div>

<div class="container">
    <div id="quiz-content">
        <h1>Тест: Внутреннее строение насекомых</h1>
        
        <form id="quizForm">
            <div class="user-info">
                <div class="input-group">
                    <label for="fio">ФИО студента *</label>
                    <input type="text" id="fio" name="fio" required placeholder="Введите ваше имя">
                </div>
                <div class="input-group">
                    <label for="group">Группа *</label>
                    <input type="text" id="group" name="group" required placeholder="Напр. Л-21">
                </div>
            </div>

            <div id="questionsContainer"></div>

            <button type="submit" id="submitBtn" class="btn-submit">Отправить ответы</button>
        </form>
    </div>

    <!-- Блок, который появится после отправки -->
    <div id="success-message">
        <div class="icon">✅</div>
        <h2>Спасибо! Ваши ответы приняты.</h2>
        <p>Результаты теста успешно отправлены преподавателю.</p>
        <p id="result-summary" style="font-weight: bold; font-size: 1.3em; margin-top: 15px; color: var(--primary-color);"></p>
        
        <button class="btn-submit" style="background-color: #34495e; margin-top: 30px; max-width: 300px; margin-left: auto; margin-right: auto;" onclick="goToHome()">
            Вернуться на главную
        </button>
    </div>
</div>

<script>
    const questions = [
        { q: "Какая система отвечает за доставку кислорода к тканям насекомых?", a: ["кровеносная", "пищеварительная", "дыхательная", "выделительная", "нервная"], c: 2 },
        { q: "Основным органом дыхательной системы насекомых являются:", a: ["лёгкие", "жабры", "трахеи", "альвеолы", "бронхи"], c: 2 },
        { q: "Через какие структуры воздух поступает в тело насекомого?", a: ["поры кожи", "трахеолы", "жабры", "дыхальца", "капилляры"], c: 3 },
        { q: "Какая система не участвует в переносе кислорода у насекомых?", a: ["дыхательная", "нервная", "пищеварительная", "кровеносная", "выделительная"], c: 3 },
        { q: "Пищеварительная система насекомых начинается с:", a: ["глотки", "ротовой полости", "зоба", "пищевода", "желудка"], c: 1 },
        { q: "В каком отделе кишечника происходит основное переваривание пищи?", a: ["передняя кишка", "зоб", "средняя кишка", "задняя кишка", "мускульный желудок"], c: 2 },
        { q: "Какую функцию выполняют слюнные железы?", a: ["выделительную", "дыхательную", "защитную", "пищеварительную", "кровеносную"], c: 3 },
        { q: "Нервная система насекомых имеет тип:", a: ["трубчатый", "диффузный", "узловой", "лучистый", "сетчатый"], c: 2 },
        { q: "Надглоточный ганглий выполняет функцию:", a: ["движения ног", "переваривания пищи", "дыхания", "управления поведением", "выделения"], c: 3 },
        { q: "Брюшная нервная цепочка отвечает за:", a: ["дыхание", "кровообращение", "работу органов чувств", "движение и работу внутренних органов", "пищеварение"], c: 3 },
        { q: "Кровеносная система насекомых является:", a: ["замкнутой", "полуоткрытой", "замкнуто-кольцевой", "незамкнутой", "отсутствующей"], c: 3 },
        { q: "Как называется жидкость, циркулирующая в теле насекомых?", a: ["кровь", "лимфа", "плазма", "гемолимфа", "сыворотка"], c: 3 },
        { q: "Основная функция гемолимфы:", a: ["перенос кислорода", "перенос питательных веществ", "дыхание", "фотосинтез", "газообмен"], c: 1 },
        { q: "Главным органом кровеносной системы является:", a: ["лёгкое", "почка", "сердце", "желудок", "трахея"], c: 2 },
        { q: "Основными органами выделительной системы насекомых являются:", a: ["почки", "нефридии", "потовые железы", "мальпигиевы сосуды", "печень"], c: 3 },
        { q: "Куда открываются мальпигиевы сосуды?", a: ["в полость тела", "в трахеи", "в сердце", "в среднюю кишку", "в заднюю кишку"], c: 4 },
        { q: "Основной продукт выделения у насекомых:", a: ["аммиак", "мочевина", "углекислый газ", "мочевая кислота", "вода"], c: 3 },
        { q: "Какая система обеспечивает координацию движений?", a: ["дыхательная", "пищеварительная", "нервная", "кровеносная", "выделительная"], c: 2 },
        { q: "Какая особенность характертерна для выделительной системы насекомых?", a: ["большое потребление воды", "отсутствие связи с кишечником", "экономия воды", "участие в дыхании", "перенос кислорода"], c: 2 },
        { q: "Какая система тесно связана с выделительной системой?", a: ["дыхательная", "нервная", "кровеносная", "пищеварительная", "покровная"], c: 3 }
    ];

    const container = document.getElementById('questionsContainer');

    questions.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        const qText = document.createElement('p');
        qText.innerText = `${index + 1}. ${item.q}`;
        qDiv.appendChild(qText);
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
        item.a.forEach((ans) => {
            const label = document.createElement('label');
            label.className = 'option';
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `q${index}`;
            radio.value = ans;
            radio.required = true;
            label.appendChild(radio);
            label.appendChild(document.createTextNode(ans));
            optionsDiv.appendChild(label);
        });
        qDiv.appendChild(optionsDiv);
        container.appendChild(qDiv);
    });

    // Блокировка инструментов разработчика
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    };

    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwLrytzhyRd5CZG2nE3XM2Cia972Xs0aCIXBoB-n-Or2usLpM6y9qpHyVfRZGKrJK5yRw/exec'; // ЗАМЕНИТЕ НА ВАШ URL

    document.getElementById('quizForm').onsubmit = function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Отправка...";
        
        document.getElementById('loading-overlay').style.display = 'flex';

        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });
        
        let score = 0;
        questions.forEach((item, index) => {
            if (data[`q${index}`] === item.a[item.c]) score++;
        });
        data.score = score;
        data.total = questions.length;

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            document.getElementById('result-summary').innerText = `Ваш результат: ${score} из ${questions.length}`;
        }).catch(err => {
            console.error(err);
            alert('Ошибка при отправке. Попробуйте еще раз.');
            submitBtn.disabled = false;
            submitBtn.innerText = "Отправить ответы";
            document.getElementById('loading-overlay').style.display = 'none';
        });
    };

    function goToHome() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
