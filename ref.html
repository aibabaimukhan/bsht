<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рефлексия после урока</title>

<style>
:root {
    --primary: #2d5a27;
    --dark: #1a3c15;
    --accent: #ffb703;
    --bg: #0f1a11;
    --text-light: #ffffff;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a3c15, #0f1a11);
    color: var(--text-light);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 10px;
}

.reflection-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 40px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

h1 a {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 6px;
}

/* Блоки */
.block { margin-bottom: 25px; }

.block-title {
    margin-bottom: 10px;
    font-weight: 600;
}

.options {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.option {
    flex: 1;
    min-width: 140px;
    padding: 14px;
    text-align: center;
    border-radius: 16px;
    border: 2px solid var(--accent);
    cursor: pointer;
    transition: 0.3s;
}

.option:hover,
.option.active {
    background: var(--accent);
    color: var(--dark);
}

/* Кнопка */
.submit-btn {
    margin: 30px 0;
    width: 100%;
    padding: 16px;
    border-radius: 50px;
    border: none;
    background: var(--accent);
    color: var(--dark);
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
}

/* Графики */
.charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}



.chart-box {
    background: rgba(0,0,0,0.25);
    padding: 20px;
    border-radius: 18px;
}

@media (max-width: 768px) {
    .charts {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="reflection-card">
    <h1><a href="index.html">Рефлексия после урока</a></h1>

    <!-- Настроение -->
    <div class="block">
        <div class="block-title">Моё настроение после урока:</div>
        <div class="options" data-group="mood">
            <div class="option" data-value="good">😊 Отличное</div>
            <div class="option" data-value="normal">😐 Нормальное</div>
            <div class="option" data-value="bad">😕 Сложно</div>
        </div>
    </div>

    <!-- Урок -->
    <div class="block">
        <div class="block-title">Урок был для меня:</div>
        <div class="options" data-group="lesson">
            <div class="option" data-value="interesting">Интересный</div>
            <div class="option" data-value="useful">Полезный</div>
            <div class="option" data-value="hard">Сложный</div>
        </div>
    </div>

    <!-- Самооценка -->
    <div class="block">
        <div class="block-title">Моя работа на уроке:</div>
        <div class="options" data-group="work">
            <div class="option" data-value="ok">Я доволен(на)</div>
            <div class="option" data-value="better">Нужно постараться лучше</div>
        </div>
    </div>

    <button class="submit-btn">Завершить рефлексию</button>

    <div class="charts">
        <div class="chart-box">
            <canvas id="moodChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="lineChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const state = { mood: null, lesson: null, work: null };

const moodData = { good: 0, normal: 0, bad: 0 };
const lessonData = { interesting: 0, useful: 0, hard: 0 };
const workData = { ok: 0, better: 0 };

let counter = 0;
const labels = [];

// выбор
document.querySelectorAll('.option').forEach(option => {
    option.addEventListener('click', () => {
        const group = option.parentElement;
        group.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        state[group.dataset.group] = option.dataset.value;
    });
});

// график настроения
const moodChart = new Chart(document.getElementById('moodChart'), {
    type: 'bar',
    data: {
        labels: ['😊 Отличное', '😐 Нормальное', '😕 Сложно'],
        datasets: [{
            label: 'Настроение класса',
            data: [0, 0, 0],
            backgroundColor: ['#4caf50','#ffb703','#e63946']
        }]
    },
    options: {
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
});

// линейный график (урок + самооценка)
const lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
        labels,
        datasets: [
            {
                label: 'Оценка урока (позитив)',
                data: [],
                borderColor: '#4caf50',
                tension: 0.3
            },
            {
                label: 'Самооценка работы (доволен)',
                data: [],
                borderColor: '#ffb703',
                tension: 0.3
            }
        ]
    },
    options: {
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
    }
});

// отправка
document.querySelector('.submit-btn').addEventListener('click', () => {
    if (!state.mood || !state.lesson || !state.work) {
        alert('Выберите все пункты');
        return;
    }

    counter++;
    labels.push(counter.toString());

    moodData[state.mood]++;
    moodChart.data.datasets[0].data = Object.values(moodData);
    moodChart.update();

    // считаем "позитив"
    const lessonPositive = state.lesson !== 'hard' ? 1 : 0;
    const workPositive = state.work === 'ok' ? 1 : 0;

    lineChart.data.datasets[0].data.push(lessonPositive);
    lineChart.data.datasets[1].data.push(workPositive);
    lineChart.update();

    document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
    state.mood = state.lesson = state.work = null;
});
</script>

</body>
</html>
