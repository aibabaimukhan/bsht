<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест — Внутреннее строение насекомых</title>

<style>
:root {
    --primary: #2d5a27;
    --dark: #1a3c15;
    --accent: #ffb703;
    --bg: #0f1a11;
    --text: #ffffff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a3c15, #0f1a11);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== Контейнер ===== */
.quiz-container {
    width: 95%;
    max-width: 900px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(14px);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
}

/* ===== Заголовок ===== */
.quiz-container h1 {
    text-align: center;
    color: var(--accent);
    margin-bottom: 10px;
}

.quiz-container p {
    text-align: center;
    margin-bottom: 30px;
    opacity: 0.9;
}

/* ===== Вопрос ===== */
.question {
    margin-bottom: 25px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(0,0,0,0.35);
}

.question h3 {
    margin: 0 0 15px;
    font-size: 1.05rem;
}

/* ===== Ответы ===== */
.answers label {
    display: block;
    margin-bottom: 10px;
    cursor: pointer;
    padding: 10px 14px;
    border-radius: 12px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.15);
}

.answers label:hover {
    background: rgba(255,183,3,0.2);
}

.answers input {
    margin-right: 10px;
}

/* ===== Кнопка ===== */
.btn {
    display: block;
    margin: 30px auto 0;
    padding: 16px 40px;
    border: none;
    border-radius: 50px;
    background: var(--accent);
    color: var(--dark);
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px var(--accent);
}

/* ===== Результат ===== */
.result {
    text-align: center;
    font-size: 1.4rem;
    margin-top: 25px;
    color: var(--accent);
}

/* ===== Адаптив ===== */
@media (max-width: 768px) {
    .quiz-container {
        padding: 25px;
    }
    .question h3 {
        font-size: 0.95rem;
    }
}
</style>
</head>
<body>

<div class="quiz-container">
    <h1>Итоговый тест</h1>
    <p>Внутреннее строение насекомых</p>
    <div style="margin-bottom:30px;">
    <input 
        type="text" 
        id="fio" 
        placeholder="Введите ФИО"
        required
        style="
            width:100%;
            padding:14px 18px;
            border-radius:14px;
            border:1px solid rgba(255,255,255,0.3);
            background:rgba(0,0,0,0.4);
            color:white;
            font-size:1rem;
        "
    >
</div>

    <form id="quizForm"></form>

    <button class="btn" onclick="checkQuiz()">Завершить тест</button>
    <div class="result" id="result"></div>
</div>

<script>
/* ===== Вопросы ===== */
const quizData = [
 { q:"Какая система отвечает за доставку кислорода к тканям насекомых?",
   a:["Кровеносная","Пищеварительная","Дыхательная","Выделительная","Нервная"], correct:2 },

 { q:"Основным органом дыхательной системы насекомых являются:",
   a:["Лёгкие","Жабры","Трахеи","Альвеолы","Бронхи"], correct:2 },

 { q:"Через какие структуры воздух поступает в тело насекомого?",
   a:["Поры кожи","Трахеолы","Жабры","Дыхальца","Капилляры"], correct:3 },

 { q:"Какая система не участвует в переносе кислорода у насекомых?",
   a:["Дыхательная","Нервная","Пищеварительная","Кровеносная","Выделительная"], correct:3 },

 { q:"Пищеварительная система насекомых начинается с:",
   a:["Глотки","Ротовой полости","Зоба","Пищевода","Желудка"], correct:1 },

 { q:"В каком отделе кишечника происходит основное переваривание пищи?",
   a:["Передняя кишка","Зоб","Средняя кишка","Задняя кишка","Мускульный желудок"], correct:2 },

 { q:"Какую функцию выполняют слюнные железы?",
   a:["Выделительную","Дыхательную","Защитную","Пищеварительную","Кровеносную"], correct:3 },

 { q:"Нервная система насекомых имеет тип:",
   a:["Трубчатый","Диффузный","Узловой","Лучистый","Сетчатый"], correct:2 },

 { q:"Надглоточный ганглий выполняет функцию:",
   a:["Движения ног","Переваривания пищи","Дыхания","Управления поведением","Выделения"], correct:3 },

 { q:"Брюшная нервная цепочка отвечает за:",
   a:["Дыхание","Кровообращение","Работу органов чувств","Движение и работу внутренних органов","Пищеварение"], correct:3 },

 { q:"Кровеносная система насекомых является:",
   a:["Замкнутой","Полуоткрытой","Замкнуто-кольцевой","Незамкнутой","Отсутствующей"], correct:3 },

 { q:"Как называется жидкость, циркулирующая в теле насекомых?",
   a:["Кровь","Лимфа","Плазма","Гемолимфа","Сыворотка"], correct:3 },

 { q:"Основная функция гемолимфы:",
   a:["Перенос кислорода","Перенос питательных веществ","Дыхание","Фотосинтез","Газообмен"], correct:1 },

 { q:"Главным органом кровеносной системы является:",
   a:["Лёгкое","Почка","Сердце","Желудок","Трахея"], correct:2 },

 { q:"Основными органами выделительной системы являются:",
   a:["Почки","Нефридии","Потовые железы","Мальпигиевы сосуды","Печень"], correct:3 },

 { q:"Куда открываются мальпигиевы сосуды?",
   a:["В полость тела","В трахеи","В сердце","В среднюю кишку","В заднюю кишку"], correct:4 },

 { q:"Основной продукт выделения у насекомых:",
   a:["Аммиак","Мочевина","Углекислый газ","Мочевая кислота","Вода"], correct:3 },

 { q:"Какая система обеспечивает координацию движений?",
   a:["Дыхательная","Пищеварительная","Нервная","Кровеносная","Выделительная"], correct:2 },

 { q:"Какая особенность характерна для выделительной системы?",
   a:["Большое потребление воды","Отсутствие связи с кишечником","Экономия воды","Участие в дыхании","Перенос кислорода"], correct:2 },

 { q:"Какая система тесно связана с выделительной?",
   a:["Дыхательная","Нервная","Кровеносная","Пищеварительная","Покровная"], correct:3 }
];

const form = document.getElementById("quizForm");

// Генерация вопросов
quizData.forEach((item, index) => {
    const block = document.createElement("div");
    block.className = "question";
    block.innerHTML = `<h3>${index + 1}. ${item.q}</h3>`;
    const answers = document.createElement("div");
    answers.className = "answers";
    item.a.forEach((ans, i) => {
        answers.innerHTML += `
            <label>
                <input type="radio" name="q${index}" value="${i}">
                ${ans}
            </label>`;
    });
    block.appendChild(answers);
    form.appendChild(block);
});

// ===== Функция отправки =====
async function sendToGoogleSheets(data) {
  const scriptURL = "https://script.google.com/macros/s/AKfycbyCKIkjtdj4L7sHMi4-fPoXQdfrZ59NXcjNKZmS2f7e-Km5I8UKb6u6oIQclQjHFe4/exec";
  try {
    await fetch(scriptURL, {
      method: "POST",
      mode: "no-cors",          // важный момент для обхода CORS
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  } catch (error) {
    alert("Ошибка при отправке данных: " + error.message);
  }
}

// ===== Проверка и отправка =====
function checkQuiz() {
    const fio = document.getElementById("fio").value.trim();
    if (!fio) {
        alert("Пожалуйста, введите ФИО");
        return;
    }

    let score = 0;
    quizData.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && Number(selected.value) === item.correct) score++;
    });

    const total = quizData.length;

    document.getElementById("result").innerHTML = `
        <div style="line-height:1.6;">
            <div><b>ФИО:</b> ${fio}</div>
            <div>Результат: <b>${score}</b> из <b>${total}</b></div>
        </div>
    `;

    // отправка в Google Sheets
    sendToGoogleSheets({
        fio: fio,
        activeScore: score,
        passiveScore: total - score
    });
}

// Блокировка F12, Ctrl+Shift+I/J/C, Ctrl+U
document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') e.preventDefault();

    // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) e.preventDefault();

    // Ctrl+U (Просмотр исходного кода)
    if (e.ctrlKey && e.key.toUpperCase() === 'U') e.preventDefault();
});

// Блокировка правой кнопки мыши
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    alert('Доступ к контекстному меню запрещен!');
});

</script>

</body>
</html>
